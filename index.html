    <style>
        body {
            font-size: calc(25px + 0.33vw);
            padding: 5vh 10vw;
        }

        a {
            text-decoration: none;
            color: #000;
        }

        .contact {
            position: relative;
        }

        .contact:after {
            content: '';
            position: absolute;
            top: 70%;
            left: -0.1em;
            right: -0.1em;
            bottom: 0;
            transition: top 200ms cubic-bezier(0, 0.8, 0.13, 1);
            background-color: rgba(79, 192, 141, 0.5);
        }

        .contact:hover:after {
            top: 0%;
        }
